general {
    # Start hyprlock if not already running; avoids multiple instances
    lock_cmd = pidof hyprlock || hyprlock

    # Called right before sleep; lets you ensure the session is locked
    before_sleep_cmd = pidof hyprlock || hyprlock

    # Turn displays back on after resume (Hyprland 0.4x+)
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'

    # Make sure hypridle gets a chance to lock before suspend
    inhibit_sleep = 2
}


# 2) Lock after 5 minutes
listener {
    timeout = 300
    on-timeout = hyprlock
}

# 3) Screen off after 5.5 minutes
listener {
    timeout = 330
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && brightnessctl -r
}

# 4) Suspend after 10 minutes
listener {
    timeout = 600
    on-timeout = loginctl suspend
}
