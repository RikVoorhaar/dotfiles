background {
    color = 0x101010
    # Or image:
    # path = /path/to/wallpaper.png
    # blur_passes = 2
    # blur_size = 7
}

label {
    text = Welcome back, Rik
    font_size = 24
    position = 0, 80
    halign = center
    valign = center
    color = 0xffffffff
}

input-field {
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    outer_color = rgba(42f560ee)
    inner_color = rgba(30, 30, 30, 1.0)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    placeholder_text = <span foreground="##cdd6f4">Password...</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

# Optional: PAM and fingerprint settings – hyprlock uses PAM by default
pam {
    enabled = true
    module = hyprlock
}
