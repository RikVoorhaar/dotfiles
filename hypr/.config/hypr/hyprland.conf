
#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/

# This is for plugging in to dock
# $monTop = DP-3
$monTop = DP-9


# This is for plugging into HDMI port directly
# $monTop = HDMI-A-1


# $monLeft = DP-2
# $monRight = DP-3
$monLaptop = eDP-1

monitor=$monTop,2560x1440@144,0x0,1
# monitor=$monLeft,1920x1080@60,0x0,1
monitor=$monLaptop,1920x1200@60,0x1440,1
# monitor=$monRight,1920x1080@60,3840x0,1


workspace=1, monitor:$monLaptop, default:true
workspace=2, monitor:$monLaptop
workspace=3, monitor:$monLaptop
workspace=4, monitor:$monLaptop
workspace=5, monitor:$monLaptop
workspace=6, monitor:$monLaptop
workspace=7, monitor:$monLaptop
workspace=8, monitor:$monLaptop
workspace=9, monitor:$monLaptop
workspace=10, monitor:$monLaptop

workspace=11, monitor:$monTop, default:true
workspace=12, monitor:$monTop
workspace=13, monitor:$monTop
workspace=14, monitor:$monTop
workspace=15, monitor:$monTop
workspace=16, monitor:$monTop
workspace=17, monitor:$monTop
workspace=18, monitor:$monTop
workspace=19, monitor:$monTop
workspace=20, monitor:$monTop

# workspace=21, monitor:$monLeft, default:true
# workspace=22, monitor:$monLeft
# workspace=23, monitor:$monLeft
# workspace=24, monitor:$monLeft
# workspace=25, monitor:$monLeft
# workspace=26, monitor:$monLeft
# workspace=27, monitor:$monLeft
# workspace=28, monitor:$monLeft
# workspace=29, monitor:$monLeft
# workspace=30, monitor:$monLeft


exec-once = wl-paste -p --watch wl-copy -pc
exec-once = nm-applet --indicator
exec-once = udiskie &
exec-once = dunst
exec-once = wpaperd
exec-once = nextcloud
# Start hypridle when Hyprland starts
exec-once = hypridle
exec-once = ~/.config/hypr/scripts/battery_watcher.sh
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,18
exec-once = hyprctl setcursor cursor_theme cursor_size
exec-once = hyprland-autoname-workspaces
exec-once = systemctl --user start hyprland-autoname-workspaces.service
exec-once = xbindkeys

# For all categories, see https://wiki.hy:wprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_model =
    kb_options = caps:swapescape
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        tap_button_map = lrm
        clickfinger_behavior = true
        disable_while_typing = true
        tap-to-click = false
    }

    repeat_rate = 60
    repeat_delay =200
    numlock_by_default = true

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

}


general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(42f560ee) rgba(42b6f5ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 2
    blur {
        enabled = false
        new_optimizations = true
    }
    # drop_shadow = false
    # shadow_range = 4
    # shadow_render_power = 3
    # col.shadow = rgba(1a1a1aee)
    inactive_opacity = 1
    active_opacity = 1
    fullscreen_opacity= 1.0
    # multisample_edges=false
}


animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = tru
}

misc {
    disable_hyprland_logo = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic mouse V1 {
#    sensitivity = -0.5
# }

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, /usr/bin/alacritty
bind = $mainMod, C, killactive,
bind = $mainMod, G, exec, google-chrome-stable
bind = $mainMod, T, exec, zeditor
bind = $mainMod, E, exec, dolphin
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, exec, wofi -I -G --show drun
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, Y, fullscreen
# bind = $mainMod, J, togglesplit, # dwindle
# bind = $mainMod, F, exec, fuzzel
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
# bind = $mainMod, H, exec, hyprsome focus l
# bind = $mainMod, L, exec, hyprsome focus r
# bind = $mainMod, K, exec, hyprsome focus u
# bind = $mainMod, J, exec, hyprsome focus d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, exec,hyprsome workspace 1
bind = $mainMod, 2, exec,hyprsome workspace 2
bind = $mainMod, 3, exec,hyprsome workspace 3
bind = $mainMod, 4, exec,hyprsome workspace 4
bind = $mainMod, 5, exec,hyprsome workspace 5
bind = $mainMod, 6, exec,hyprsome workspace 6
bind = $mainMod, 7, exec,hyprsome workspace 7
bind = $mainMod, 8, exec,hyprsome workspace 8
bind = $mainMod, 9, exec,hyprsome workspace 9
bind = $mainMod, 0, exec,hyprsome workspace 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, exec, hyprsome movefocus 1
bind = $mainMod SHIFT, 2, exec, hyprsome movefocus 2
bind = $mainMod SHIFT, 3, exec, hyprsome movefocus 3
bind = $mainMod SHIFT, 4, exec, hyprsome movefocus 4
bind = $mainMod SHIFT, 5, exec, hyprsome movefocus 5
bind = $mainMod SHIFT, 6, exec, hyprsome movefocus 6
bind = $mainMod SHIFT, 7, exec, hyprsome movefocus 7
bind = $mainMod SHIFT, 8, exec, hyprsome movefocus 8
bind = $mainMod SHIFT, 9, exec, hyprsome movefocus 9
bind = $mainMod SHIFT, 0, exec, hyprsome movefocus 10

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Horizontal split / width nudge (~40px; tiled = split ratio, floating = pixels)
binde = $mainMod, comma, resizeactive, -10 0
binde = $mainMod, period, resizeactive, 10 0

# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Lock + suspend on lid close, handled entirely by Hyprland
bindl = ,switch:on:Lid Switch, exec, loginctl suspend
